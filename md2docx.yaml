# ========== md2docx 配置文件 ==========

# --- 页面设置 ---
page:
  top_margin_cm: 2.54
  bottom_margin_cm: 2.54
  left_margin_cm: 3.17
  right_margin_cm: 3.17

# --- 正文样式 ---
body:
  font_cn: 仿宋_GB2312
  font_en: Times New Roman
  font_size_pt: 12
  line_spacing: 1.0            # 倍数行距（1.0 = 单倍, 1.5 = 1.5倍）
  first_line_indent_cm: 0.74

# --- 标题样式 (h1 ~ h3) ---
# 标题自动编号格式：
#   h1: 一、二、三、...（中文大写）
#   h2: 1.1, 1.2, 2.1, ...
#   h3: 1.1.1, 1.1.2, ...
# 全部左对齐
headings:
  h1: { font_cn: 黑体, size_pt: 16, bold: true }
  h2: { font_cn: 黑体, size_pt: 14, bold: true }
  h3: { font_cn: 黑体, size_pt: 13, bold: true }
  h4: { font_cn: 黑体, size_pt: 12, bold: true }
  h5: { font_cn: 黑体, size_pt: 11, bold: true }
  h6: { font_cn: 黑体, size_pt: 11, bold: true }

  # 标题自动编号（true/false）
  auto_numbering: true

# --- 表格样式 ---
table:
  header_font_cn: 黑体
  header_font_size_pt: 11
  header_bold: true
  body_font_cn: 仿宋_GB2312
  body_font_size_pt: 11

  # 表格行高设置（二选一，都注释掉则使用 Word 默认自动行高）:
  row_height_pt: 20
  # row_height_line: 1.2

  # 表格边框样式:
  #   grid      - 全边框网格线（默认）
  #   three_line - 三线表（学术论文标准，顶线底线1.5磅，栏目线0.75磅，无竖线）
  style: three_line

# --- 列表编号 ---
list:
  # 编号格式:
  #   academic - 学术格式: 1）→（1）→ ① → a）
  #   circle   - 圈号格式: ①②③ → ⑴⑵⑶ → a. → 1.
  style: academic

# --- 公式/图/表编号 ---
formula:
  # 编号格式:
  #   plain   - 纯序号 (1), (2), (3)...
  #   chapter - 章节.序号 (1.1), (1.2), (2.1)...  按 h1 标题自动分章
  numbering: chapter

# --- 图表标题 ---
caption:
  font_cn: 黑体
  font_size_pt: 11

# --- 页眉页脚 ---
header_footer:
  # 页眉 (留空则不显示页眉)
  header_text: ""
  header_font_cn: 仿宋_GB2312
  header_font_size_pt: 9
  # 页脚页码
  page_number: true          # true/false 是否显示页码
  page_number_position: bottom_center   # bottom_center / bottom_right
  page_number_font_size_pt: 9
